<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN STUM</title>
</head>

<body style="
margin:0;
min-height:100vh;
background: linear-gradient(180deg, #001b33 0%, #072e64 50%, #2889d9 100%);
background-repeat:no-repeat;
background-attachment:fixed;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:white;
">

<div style="
background:#111827;
width:800px;
max-width:90%;
padding:40px;
border-radius:20px;
box-shadow:0px 0px 30px rgba(0,0,0,0.6);
text-align:center;
">

    <img src="01zLOGO.png" width="350" alt="Logo STUM">

    <h2>VENHA FAZER PARTE</h2>

    <form>

        <fieldset style="
        border:1px solid #2889d9;
        border-radius:10px;
        padding:20px;
        margin-bottom:20px;">

            <legend>Dados do Usuário</legend>

            <p>
                <label>Nome:</label><br>
                <input type="text" placeholder="Digite seu nome"
                style="width:95%; padding:10px; border-radius:8px;">
            </p>

            <p>
                <label>Email:</label><br>
                <input type="email" placeholder="exemplo@email.com"
                style="width:95%; padding:10px; border-radius:8px;">
            </p>

            <p>
                <label>Senha:</label><br>
                <input type="password"
                style="width:95%; padding:10px; border-radius:8px;">
            </p>

            <p>
                <label>Idade:</label><br>
                <input type="number"
                style="width:95%; padding:10px; border-radius:8px;">
            </p>

        </fieldset>

        <fieldset style="
        border:1px solid #2889d9;
        border-radius:10px;
        padding:20px;">

            <legend>Preferências</legend>

            <p>
                <label>Categoria:</label><br>

                <select style="
                width:98%;
                padding:10px;
                border-radius:8px;">

                    <option>JOGOS</option>
                    <option>GAME PASS</option>
                    <option>STUM VIP</option>

                </select>
            </p>

            <p>Tipo de Conta:</p>

            <label>
                <input type="checkbox"> PADRÃO
            </label>

            <br><br>

            <label>
                <input type="checkbox"> PRIVADA
            </label>

        </fieldset>

        <br>

        <a href="pagJogos.html"
style="
display:block;
background:#2889d9;
color:white;
text-decoration:none;
padding:15px;
border-radius:10px;
width:100%;
box-sizing:border-box;
font-size:18px;
text-align:center;
">
Entrar
</a>

    </form>

    <br>

    <footer>
        <p>&copy; STUM </p>
    </footer>

</div>

</body>
</html>
